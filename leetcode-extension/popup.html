<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: #ffa116; /* LeetCode orange */
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 12px;
      min-height: 16px;
      word-break: break-word;
    }

    #status.error { color: #ff6b6b; }
    #status.success { color: #51cf66; }

    #filename {
      font-size: 12px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      color: #ddd;
      margin-bottom: 12px;
      word-break: break-all;
      display: none;
    }

    button {
      width: 100%;
      padding: 9px;
      background: #ffa116;
      color: #000;
      font-weight: 600;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #ffb84d; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>LeetCode → Obsidian</h2>
  <div id="status">Detecting problem...</div>
  <div id="filename"></div>
  <button id="createBtn" disabled>Create Note</button>

  <script src="popup.js"></script>
</body>
</html>
